<body>
    <header>
        <div class="logo">IRON FORCE</div>
        <nav>
            <ul class="main-nav">
                <li><a href="index.html">Головна</a></li>
                <li class="dropdown">
                    <a href="services.html">Послуги ▾</a>
                    <ul class="dropdown-content">
                        <li><a href="services.html#prices">Абонементи</a></li>
                        <li><a href="services.html#benefits">Що є у залі</a></li>

    <main>
        <section class="hero-section">
            <h1>Зворотній <span class="accent">Зв'язок</span></h1>
        </section>

        <div class="contact-container">
            <section class="card contact-form-card">
                <h2>Записатись на тренування</h2>
                <form>
                    <input type="text" placeholder="Ваше ім'я" required>
                    <input type="email" placeholder="Email" required>
                    <input type="tel" placeholder="Номер телефону" required>
                    <textarea placeholder="Ваше повідомлення" rows="4"></textarea>
                    <button type="submit" class="btn">Відправити</button>
                </form>
            </section>

            <section class="card contact-map-card">
                <h2>Ми на карті</h2>
                <div class="map-wrapper">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2564.123456789!2d36.230!3d50.000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNTDCsDAwJzAwLjAiTiAzNsKwMTMnNDguMCJF!5e0!3m2!1suk!2sua!4v1234567890" width="100%" height="300" style="border:0; border-radius: 10px;" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <p style="margin-top: 15px; text-align: center;">вул. Спортивна, 12, Харків</p>
            </section>
        </div>
    </main>
